<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sausage Background Processor</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: #f5f5f5;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .preview-container {
            background: #fef2f2;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #canvas {
            display: block;
            border: 2px solid #fee2e2;
            border-radius: 8px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        button:hover {
            background: #b91c1c;
        }

        input[type="file"] {
            padding: 10px;
            border: 2px solid #fee2e2;
            border-radius: 6px;
            background: white;
        }

        .info {
            background: white;
            padding: 16px;
            border-radius: 8px;
            max-width: 600px;
            text-align: center;
            color: #374151;
        }
    </style>
</head>
<body>
    <div class="info">
        <h1 style="margin: 0 0 10px 0; color: #dc2626;">Sausage Background Processor</h1>
        <p style="margin: 0;">This tool adds a red-50 (#fef2f2) background to transparent images.</p>
    </div>

    <div class="controls">
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="downloadImage()">Download Image</button>
    </div>

    <div class="preview-container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('fileInput');
        let currentImage = null;

        // Red-50 color
        const RED_50 = '#fef2f2';

        // Load the default sausage image
        function loadDefaultImage() {
            const img = new Image();
            img.onload = function() {
                currentImage = img;
                drawImageWithBackground(img);
            };
            img.src = '/sausage_link_transparent.jpeg';
        }

        function drawImageWithBackground(img) {
            // Set canvas size to match image
            canvas.width = img.width;
            canvas.height = img.height;

            // Fill with red-50 background
            ctx.fillStyle = RED_50;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw the image on top
            ctx.drawImage(img, 0, 0);
        }

        function downloadImage() {
            if (!currentImage) {
                alert('No image loaded yet!');
                return;
            }

            const link = document.createElement('a');
            link.download = 'sausage_red50_bg.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Handle file input
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    currentImage = img;
                    drawImageWithBackground(img);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Load default image on page load
        loadDefaultImage();
    </script>
</body>
</html>
