# Deploy built Vite site (crawfishboil-main/dist) to hosting public_html via FTP.
# Workflow must live at repo root: .github/workflows/ (GitHub does not load workflows from subfolders).

name: Deploy to 20i (mirror public_html)

on:
  push:
    branches: ['main']
  workflow_dispatch:

env:
  # Proactive: align JavaScript-based actions with Node 24 before platform default flip (June 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: crawfishboil-main/package-lock.json

      - name: Install dependencies & build
        working-directory: crawfishboil-main
        run: |
          npm ci
          npm run build

      - name: Mirror to 20i via FTP (OVERWRITES remote)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./crawfishboil-main/dist/
          server-dir: /public_html/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.DS_Store
