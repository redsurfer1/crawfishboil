<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Red-50 Background to Sausage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(220, 38, 38, 0.15);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #dc2626;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #6b7280;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #fca5a5;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #fef2f2;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .upload-area:hover {
            border-color: #dc2626;
            background: #fee2e2;
        }

        .upload-area.drag-over {
            border-color: #dc2626;
            background: #fee2e2;
            transform: scale(1.02);
        }

        input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #374151;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #9ca3af;
            font-size: 12px;
        }

        .preview-section {
            display: none;
            margin-bottom: 20px;
        }

        .preview-section.active {
            display: block;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .preview-item {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .preview-label {
            color: #6b7280;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .canvas-wrapper {
            background: #fef2f2;
            border-radius: 8px;
            padding: 20px;
            display: inline-block;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #dc2626;
            color: white;
        }

        .btn-primary:hover {
            background: #b91c1c;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            font-size: 13px;
            color: #1e40af;
        }

        .info-box strong {
            color: #1e3a8a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌭 Sausage Background Processor</h1>
        <p class="subtitle">Add a red-50 (#fef2f2) background to transparent images</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📤</div>
            <div class="upload-text">Click to upload or drag & drop</div>
            <div class="upload-hint">PNG, JPEG, or WebP</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="preview-section" id="previewSection">
            <div class="preview-grid">
                <div class="preview-item">
                    <div class="preview-label">Original</div>
                    <div class="canvas-wrapper">
                        <canvas id="originalCanvas"></canvas>
                    </div>
                </div>
                <div class="preview-item">
                    <div class="preview-label">With Red-50 Background</div>
                    <div class="canvas-wrapper">
                        <canvas id="processedCanvas"></canvas>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="downloadProcessedImage()">
                    ⬇️ Download Image
                </button>
                <button class="btn-secondary" onclick="reset()">
                    🔄 Start Over
                </button>
            </div>

            <div class="info-box">
                <strong>Next Step:</strong> After downloading, save the image as <code>sausage_red50_bg.png</code> in your project's <code>public</code> folder.
            </div>
        </div>
    </div>

    <script>
        const RED_50 = '#fef2f2';
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewSection = document.getElementById('previewSection');
        const originalCanvas = document.getElementById('originalCanvas');
        const processedCanvas = document.getElementById('processedCanvas');
        let currentImage = null;

        // Click to upload
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                processFile(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                processFile(file);
            }
        });

        function processFile(file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    displayImages(img);
                    previewSection.classList.add('active');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function displayImages(img) {
            // Original canvas
            const maxSize = 250;
            let width = img.width;
            let height = img.height;

            if (width > maxSize || height > maxSize) {
                const scale = maxSize / Math.max(width, height);
                width *= scale;
                height *= scale;
            }

            originalCanvas.width = width;
            originalCanvas.height = height;
            const origCtx = originalCanvas.getContext('2d');
            origCtx.drawImage(img, 0, 0, width, height);

            // Processed canvas with red-50 background
            processedCanvas.width = img.width;
            processedCanvas.height = img.height;
            const procCtx = processedCanvas.getContext('2d');

            // Fill with red-50
            procCtx.fillStyle = RED_50;
            procCtx.fillRect(0, 0, img.width, img.height);

            // Draw image on top
            procCtx.drawImage(img, 0, 0);
        }

        function downloadProcessedImage() {
            if (!currentImage) return;

            const link = document.createElement('a');
            link.download = 'sausage_red50_bg.png';
            link.href = processedCanvas.toDataURL('image/png');
            link.click();
        }

        function reset() {
            currentImage = null;
            fileInput.value = '';
            previewSection.classList.remove('active');
            originalCanvas.width = 0;
            originalCanvas.height = 0;
            processedCanvas.width = 0;
            processedCanvas.height = 0;
        }
    </script>
</body>
</html>
