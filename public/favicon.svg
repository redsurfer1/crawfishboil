<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <g fill="#DC2626">
    <!-- Main body -->
    <ellipse cx="32" cy="36" rx="14" ry="10"/>

    <!-- Head -->
    <ellipse cx="32" cy="22" rx="10" ry="8"/>

    <!-- Tail segments -->
    <ellipse cx="32" cy="46" rx="11" ry="6"/>
    <ellipse cx="32" cy="52" rx="8" ry="4"/>
    <ellipse cx="32" cy="56" rx="5" ry="3"/>

    <!-- Left claw -->
    <ellipse cx="20" cy="20" rx="5" ry="3" transform="rotate(-30 20 20)"/>
    <circle cx="16" cy="16" r="3.5"/>

    <!-- Right claw -->
    <ellipse cx="44" cy="20" rx="5" ry="3" transform="rotate(30 44 20)"/>
    <circle cx="48" cy="16" r="3.5"/>

    <!-- Left legs -->
    <rect x="18" y="30" width="2" height="8" rx="1" transform="rotate(-20 19 34)"/>
    <rect x="18" y="36" width="2" height="8" rx="1" transform="rotate(-15 19 40)"/>
    <rect x="18" y="42" width="2" height="6" rx="1" transform="rotate(-10 19 45)"/>

    <!-- Right legs -->
    <rect x="44" y="30" width="2" height="8" rx="1" transform="rotate(20 45 34)"/>
    <rect x="44" y="36" width="2" height="8" rx="1" transform="rotate(15 45 40)"/>
    <rect x="44" y="42" width="2" height="6" rx="1" transform="rotate(10 45 45)"/>

    <!-- Eyes -->
    <circle cx="28" cy="20" r="2" fill="#FFF"/>
    <circle cx="36" cy="20" r="2" fill="#FFF"/>
    <circle cx="28" cy="20" r="1" fill="#000"/>
    <circle cx="36" cy="20" r="1" fill="#000"/>
  </g>
</svg>
